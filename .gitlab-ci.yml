workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - deploy

deploy-production:
  stage: deploy
  image: node:20-bookworm

  before_script:
    - npm install -g seqpulse@0.5.2

  script:
    - |
      set -eu

      seqpulse ci trigger \
        --env prod \
        --branch "$CI_COMMIT_REF_NAME" \
        --output json > seqpulse_trigger.json

    - |
      node <<'NODE'
const fs = require("fs");

const txt = fs.readFileSync("seqpulse_trigger.json", "utf8").trim();
const json = JSON.parse(txt || "{}");

const deploymentId =
  json.deployment_id ||
  json.deploymentId ||
  (json.data && (json.data.deployment_id || json.data.deploymentId)) ||
  "";

if (!deploymentId) {
  console.error("Unable to extract deployment_id from SeqPulse trigger output:", txt);
  process.exit(1);
}

fs.writeFileSync(".seqpulse_deployment_id", deploymentId, "utf8");
console.log("SeqPulse deployment_id:", deploymentId);
NODE

    - echo "Deploy step placeholder (no-op)."

  after_script:
    - |
      set +e

      DEPLOYMENT_ID=""

      if [ -f ".seqpulse_deployment_id" ]; then
        DEPLOYMENT_ID="$(cat .seqpulse_deployment_id)"
      fi

      if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
        seqpulse ci finish \
          --deployment-id "$DEPLOYMENT_ID" \
          --job-status "${CI_JOB_STATUS:-unknown}"
      else
        echo "No deployment id found; skipping SeqPulse finish."
      fi