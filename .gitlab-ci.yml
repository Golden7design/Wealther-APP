workflow:
  rules:
    # équivalent de:
    # on: push (main)
    - if: $CI_COMMIT_BRANCH == "main"

    # équivalent de:
    # workflow_dispatch
    - if: $CI_PIPELINE_SOURCE == "web"

stages:
  - deploy

deploy-production:
  stage: deploy
  image: node:20-bookworm

  before_script:
    # installer seqpulse CLI
    - npm install -g seqpulse@0.5.2

    # installer jq pour parser le JSON
    - apt-get update -qq
    - apt-get install -y jq

  script:
    - |
      set -eu

      echo "Triggering SeqPulse deployment..."

      seqpulse ci trigger \
        --env prod \
        --branch "$CI_COMMIT_REF_NAME" \
        --output json > seqpulse_trigger.json

      echo "SeqPulse trigger response:"
      cat seqpulse_trigger.json

      DEPLOYMENT_ID=$(jq -r '
        .deployment_id //
        .deploymentId //
        .data.deployment_id //
        .data.deploymentId //
        empty
      ' seqpulse_trigger.json)

      if [ -z "$DEPLOYMENT_ID" ]; then
        echo "Failed to extract deployment_id"
        exit 1
      fi

      echo "$DEPLOYMENT_ID" > .seqpulse_deployment_id
      echo "SeqPulse deployment_id: $DEPLOYMENT_ID"

      # ici ton deploy réel si nécessaire
      echo "Deploy step placeholder (no-op)"

  after_script:
    - |
      set +e

      if [ -f ".seqpulse_deployment_id" ]; then
        DEPLOYMENT_ID=$(cat .seqpulse_deployment_id)
      else
        DEPLOYMENT_ID=""
      fi

      if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
        echo "Sending finish event to SeqPulse..."

        seqpulse ci finish \
          --deployment-id "$DEPLOYMENT_ID" \
          --job-status "${CI_JOB_STATUS:-unknown}"

      else
        echo "No deployment id found; skipping SeqPulse finish."
      fi